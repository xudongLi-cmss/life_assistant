name: life_assistant
description: 生活助理 - 智能事项提醒应用
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI组件
  cupertino_icons: ^1.0.6

  # 状态管理
  provider: ^6.1.1

  # 本地存储
  sqflite: ^2.3.0
  shared_preferences: ^2.2.2
  path_provider: ^2.1.1

  # Web存储支持
  web: ^0.5.0

  # 日期时间处理
  intl: ^0.18.1

  # 通知
  flutter_local_notifications: ^16.3.0
  timezone: ^0.9.2

  # AI API
  http: ^1.1.2

  # 其他工具
  uuid: ^4.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true

  # assets:
  #   - assets/images/
  #   - assets/icons/
