name: Build iOS and Android

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    - name: Flutter version
      run: flutter --version

    - name: Install dependencies
      run: flutter pub get

    - name: Install CocoaPods
      run: |
        cd ios
        rm -rf Pods Podfile.lock
        pod install --repo-update
      shell: bash

    - name: Build iOS (no codesign)
      run: |
        flutter build ios --no-codesign --release

    - name: Upload iOS artifact
      uses: actions/upload-artifact@v4
      with:
        name: ios-build
        path: build/ios/iphoneos/Runner.app

  build-android:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    - name: Flutter version
      run: flutter --version

    - name: Install dependencies
      run: flutter pub get

    - name: Fix Android Project
      run: |
        echo "Backing up current Android configuration..."
        cp -r android android_backup || true
        echo "Regenerating Android project with Flutter..."
        flutter create --org com.example --project-name life_assistant . --android-language kotlin
        echo "Android project regenerated"

    - name: Build APK
      run: |
        flutter build apk --release
        flutter build app-bundle --release

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: android-apk
        path: build/app/outputs/flutter-apk/app-release.apk

    - name: Upload App Bundle artifact
      uses: actions/upload-artifact@v4
      with:
        name: android-bundle
        path: build/app/outputs/bundle/release/app-release.aab
