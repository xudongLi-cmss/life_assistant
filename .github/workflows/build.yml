name: Build iOS and Android

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    - name: Flutter version
      run: flutter --version

    - name: Install dependencies
      run: flutter pub get

    - name: Install CocoaPods
      run: |
        cd ios
        rm -rf Pods Podfile.lock
        pod install --repo-update
      shell: bash

    - name: Build iOS (no codesign)
      run: |
        flutter build ios --no-codesign --release

    - name: Upload iOS artifact
      uses: actions/upload-artifact@v4
      with:
        name: ios-build
        path: build/ios/iphoneos/Runner.app

  build-android:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    - name: Flutter version
      run: flutter --version

    - name: Install dependencies
      run: flutter pub get

    - name: Setup Gradle Wrapper
      run: |
        cd android
        chmod +x gradlew
        chmod +x ../.github/scripts/fix-gradle-wrapper.sh
        ../.github/scripts/fix-gradle-wrapper.sh || {
          echo "Gradle wrapper setup failed, attempting to use Flutter to fix Android project..."
          cd ..
          chmod +x .github/scripts/fix-android-project.sh
          .github/scripts/fix-android-project.sh
        }
        # Verify gradle wrapper is set up correctly
        cd android
        ls -la gradle/wrapper/
        test -f gradle/wrapper/gradle-wrapper.jar && echo "gradle-wrapper.jar exists" || echo "gradle-wrapper.jar missing"
        ./gradlew --version

    - name: Build APK
      run: |
        flutter build apk --release
        flutter build app-bundle --release

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: android-apk
        path: build/app/outputs/flutter-apk/app-release.apk

    - name: Upload App Bundle artifact
      uses: actions/upload-artifact@v4
      with:
        name: android-bundle
        path: build/app/outputs/bundle/release/app-release.aab
